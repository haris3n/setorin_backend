name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TESTING ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "🚀 Mulai deployment..."

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Masuk ke folder project
            cd /home/${{ secrets.SERVER_USER }}/RPL2B-kelompok-8

            # Pull image terbaru
            docker pull ghcr.io/${{ github.repository }}:latest

            # Update container
            docker compose up -d --remove-orphans

            echo "⏳ Menunggu stabilitas container (15 detik)..."
            sleep 15

            # Cek apakah container DB siap menerima koneksi
            echo "🔍 Mengecek koneksi database..."
            MAX_RETRIES=10
            COUNT=0
            until docker compose exec -T db mysqladmin ping -h "localhost" --silent || [ $COUNT -eq $MAX_RETRIES ]; do
              echo "⏳ Database belum siap, mencoba lagi ($((COUNT+1))/$MAX_RETRIES)..."
              sleep 3
              COUNT=$((COUNT+1))
            done

            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Error: Database gagal ready setelah beberapa percobaan."
              docker compose logs db
              exit 1
            fi

            # Jalankan migrasi database melalui service 'app'
            echo "🏃 Menjalankan migrasi database..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            echo "✅ Deployment selesai!"